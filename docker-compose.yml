services:
  fitwiki-mcp:
    build: .
    image: ghcr.io/dzendys/fitwiki-mcp:latest
    container_name: fitwiki-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    volumes:
      - ./markdown_output:/app/markdown_output
      - ./pdfs:/app/pdfs